<div class="enfermera-list">
  <div class="card">
    <div class="card-header">
      <h2 class="card-title">Gestión de Enfermeras</h2>
      <button class="btn btn-success" (click)="openCreateModal()">Nueva Enfermera</button>
    </div>
    <div class="card-body">
      <div class="filters mb-3">
        <div class="row">
          <div class="col-md-3">
            <input type="text" class="form-control" placeholder="Buscar por nombre..." [(ngModel)]="filters.nombre" (input)="onFilterChange()">
          </div>
          <div class="col-md-2">
            <button class="btn btn-secondary" (click)="clearFilters()">Limpiar</button>
          </div>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Apellido</th>
              <th>Teléfono</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngIf="loading"><td colspan="5" class="text-center">Cargando...</td></tr>
            <tr *ngIf="!loading && enfermeras.length === 0"><td colspan="5" class="text-center">No hay enfermeras disponibles</td></tr>
            <tr *ngFor="let enfermera of enfermeras">
              <td>{{ enfermera.id }}</td>
              <td>{{ enfermera.nombre }}</td>
              <td>{{ enfermera.apellido }}</td>
              <td>{{ enfermera.telefono || '-' }}</td>
              <td>
                <button class="btn btn-sm btn-primary me-1" (click)="editEnfermera(enfermera)">Editar</button>
                <button class="btn btn-sm btn-danger" (click)="deleteEnfermera(enfermera)">Eliminar</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
